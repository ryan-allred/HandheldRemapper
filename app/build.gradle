plugins { id 'com.android.application' }

android {
    namespace 'com.gravecow.handheldremapper'
    compileSdk 35

    def ciRunNumber = System.getenv('GITHUB_RUN_NUMBER')
    def generatedVersionCode = ciRunNumber ? Math.max(2, ciRunNumber.toInteger()) : 2

    signingConfigs {
        devUpdate {
            storeFile file('signing/androidremapper-dev.jks')
            storePassword 'androidremapper'
            keyAlias 'androidremapper-dev'
            keyPassword 'androidremapper'
        }
    }

    defaultConfig {
        applicationId 'com.gravecow.handheldremapper'
        minSdk 26
        targetSdk 35
        versionCode generatedVersionCode
        versionName "1.1.${generatedVersionCode}"
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.devUpdate
        }
    }
}

def nativeDaemonSource = rootProject.layout.projectDirectory.file('native/handheld_remapperd.c')
def nativeDaemonOutput = layout.projectDirectory.file('src/main/assets/module/handheld_remapperd')

tasks.register('buildNativeDaemon', Exec) {
    inputs.file(nativeDaemonSource)
    outputs.file(nativeDaemonOutput)
    doFirst {
        def sdkDir = null
        def localProperties = rootProject.file('local.properties')
        if (localProperties.exists()) {
            def props = new Properties()
            localProperties.withInputStream { props.load(it) }
            def configuredSdk = props.getProperty('sdk.dir')
            if (configuredSdk) sdkDir = new File(configuredSdk)
        }
        if (sdkDir == null) {
            def envSdk = System.getenv('ANDROID_HOME') ?: System.getenv('ANDROID_SDK_ROOT')
            if (envSdk) sdkDir = new File(envSdk)
        }
        if (sdkDir == null || !sdkDir.exists()) {
            throw new GradleException('Android SDK not found. Set sdk.dir in local.properties or ANDROID_HOME.')
        }
        def ndkRoot = new File(sdkDir, 'ndk')
        def ndkDir = ndkRoot.exists() ? ndkRoot.listFiles()?.findAll { it.isDirectory() }?.sort { it.name }?.last() : null
        if (ndkDir == null) {
            throw new GradleException("Android NDK not found under ${ndkRoot}. Install an Android NDK in the SDK manager.")
        }
        def hostTag = org.gradle.internal.os.OperatingSystem.current().isWindows() ? 'windows-x86_64' :
                (org.gradle.internal.os.OperatingSystem.current().isMacOsX() ? 'darwin-x86_64' : 'linux-x86_64')
        def clangName = org.gradle.internal.os.OperatingSystem.current().isWindows() ? 'aarch64-linux-android23-clang.cmd' : 'aarch64-linux-android23-clang'
        def clang = new File(ndkDir, "toolchains/llvm/prebuilt/${hostTag}/bin/${clangName}")
        if (!clang.exists()) {
            throw new GradleException("Android NDK clang not found at ${clang}. Install an Android NDK in the SDK manager.")
        }
        nativeDaemonOutput.asFile.parentFile.mkdirs()
        commandLine clang.absolutePath,
                '-O2', '-Wall', '-Wextra', '-fPIE', '-pie',
                nativeDaemonSource.asFile.absolutePath,
                '-o', nativeDaemonOutput.asFile.absolutePath
    }
}

android.applicationVariants.configureEach { variant ->
    variant.mergeAssetsProvider.configure {
        dependsOn tasks.named('buildNativeDaemon')
    }
}

dependencies {
    implementation 'com.google.android.material:material:1.12.0'
}
