name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK pieces
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"

      - name: Download Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp

      - name: Build debug APK
        run: /tmp/gradle-8.7/bin/gradle --no-daemon assembleDebug

      - name: Prepare APK artifact
        run: |
          mkdir -p dist

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            APK_NAME="HandheldRemapper-${GITHUB_REF_NAME}-debug.apk"
          else
            APK_NAME="HandheldRemapper-${GITHUB_SHA::7}-debug.apk"
          fi

          cp app/build/outputs/apk/debug/app-debug.apk "dist/${APK_NAME}"

          cd dist
          sha256sum "${APK_NAME}" > "${APK_NAME}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: handheld-remapper-debug-apk
          path: dist/*

      - name: Generate build provenance attestation
        if: github.ref_type == 'tag'
        uses: actions/attest@v4
        with:
          subject-path: dist/*.apk

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          APK_NAME="HandheldRemapper-${GITHUB_REF_NAME}-debug.apk"

          cat > release-notes.md <<EOF
          Built by GitHub Actions.

          - Workflow run: ${RUN_URL}
          - Commit: ${{ github.sha }}
          - Ref: ${{ github.ref_name }}

          Verify build provenance after downloading the APK:

          \`\`\`bash
          gh attestation verify "${APK_NAME}" -R ${{ github.repository }}
          \`\`\`
          EOF

          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --verify-tag